<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Happy Birthday Eti - Magical Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #00050b; 
            font-family: 'Poppins', sans-serif;
        }
        canvas { 
            display: block; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        .text-item {
            color: #ffffff;
            font-size: 1.5rem;
            margin: 8px 0;
            opacity: 0;
            transition: opacity 2.5s ease-in-out, transform 2.5s ease;
            text-align: center;
            text-shadow: 0px 0px 15px rgba(255, 255, 255, 0.5), 2px 2px 8px rgba(0,0,0,0.9);
            transform: translateY(20px);
            width: 90%;
            max-width: 600px;
            word-wrap: break-word;
        }
        .text-item.show {
            opacity: 1;
            transform: translateY(0);
        }
        .highlight { 
            color: #ffeb3b; 
            font-weight: 600; 
            font-size: 2rem; 
            text-shadow: 0px 0px 20px rgba(255, 235, 59, 0.6); 
        }

        /* স্টার্ট স্ক্রিন ওভারলে */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 11, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }
        #start-btn {
            background: linear-gradient(45deg, #ff4081, #00e5ff);
            color: white; border: none;
            padding: 15px 35px; font-size: 1.2rem; font-weight: 600;
            border-radius: 30px; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            font-family: 'Poppins', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 64, 129, 0.8);
        }

        @media (max-width: 600px) {
            .text-item {
                font-size: 1.1rem;
                margin: 6px 0;
                width: 95%;
            }
            .highlight {
                font-size: 1.4rem;
            }
            #start-btn {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- মিউজিক ও জার্নি শুরু করার জন্য ওভারলে স্ক্রিন -->
    <div id="start-overlay">
        <button id="start-btn">Start Magical Journey ✨</button>
    </div>

    <div id="ui-layer">
        <div class="text-item highlight">HAPPY BIRTHDAY, ETI! ❤️🎂</div>
        <div class="text-item">তুই আমার জীবনের সবথেকে Special মানুষ....</div>
        <div class="text-item">আজকের এই বিশেষ দিনে আমি চাই তোর সবস্বপ্ন পূরণ হোক,</div>
        <div class="text-item">আর তোর life খুশিতে ভরে উঠুক,</div>
        <div class="text-item">ভগবান তোকে অনেক অনেক সফলতা দিক।</div>
        <div class="text-item">সবসময় এভাবেই হাসিখুশি থাকিস।</div>
        <div class="text-item highlight">আমি তোকে অনেক ভালোবাসি। ❤️🥰</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';

        // --- অডিও সেটআপ ---
        const bgMusic = new Audio('dhun.mp3'); 
        bgMusic.loop = true;
        bgMusic.preload = 'auto'; // মোবাইল ব্রাউজারকে গানটি আগে থেকে লোড করতে সাহায্য করবে

        // --- ১. গলো টেক্সচার ফাংশন ---
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }
        const glowTexture = createGlowTexture();

        // --- ২. সিন, ক্যামেরা ও রেন্ডারার সেটআপ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x00050b);
        scene.fog = new THREE.FogExp2(0x00050b, 0.03);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- ৩. লাইٹنگ সেটআপ ---
        const ambientLight = new THREE.AmbientLight(0x334466, 1.2);
        scene.add(ambientLight);

        const moonlight = new THREE.DirectionalLight(0x99aacc, 1.8);
        moonlight.position.set(20, 40, 20);
        scene.add(moonlight);

        // --- গ্রুপ ১: ম্যাজিক্যাল নাইট (স্টেপ ১) ---
        const phase1Group = new THREE.Group();
        scene.add(phase1Group);

        const moonGeo = new THREE.SphereGeometry(3, 32, 32);
        const moonMat = new THREE.MeshBasicMaterial({ color: 0xffffee });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        moon.position.set(12, 10, -20);
        phase1Group.add(moon);

        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 600;
        const starsPos = new Float32Array(starsCount * 3);
        for(let i=0; i<starsCount*3; i++) { starsPos[i] = (Math.random() - 0.5) * 100; }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({
            color: 0xffffff, size: 0.4, map: glowTexture, transparent: true, opacity: 0.8, depthWrite: false, blending: THREE.AdditiveBlending
        });
        const stars = new THREE.Points(starsGeo, starsMat);
        phase1Group.add(stars);

        const rainLinesCount = 800;
        const rainLinesGeo = new THREE.BufferGeometry();
        const rainLinesVertices = [];
        for(let i=0; i<rainLinesCount; i++) {
            const x = (Math.random() - 0.5) * 50; const y = Math.random() * 30; const z = (Math.random() - 0.5) * 30;
            rainLinesVertices.push(x, y, z, x - 0.05, y - 0.8, z);
        }
        rainLinesGeo.setAttribute('position', new THREE.Float32BufferAttribute(rainLinesVertices, 3));
        const rainLinesMat = new THREE.LineBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.4 });
        const rainLines = new THREE.LineSegments(rainLinesGeo, rainLinesMat);
        phase1Group.add(rainLines);

        const birds = [];
        function createDetailedBird() {
            const birdGroup = new THREE.Group();
            const bodyGeo = new THREE.ConeGeometry(0.06, 0.3, 8); bodyGeo.rotateX(Math.PI / 2);
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const body = new THREE.Mesh(bodyGeo, bodyMat); birdGroup.add(body);

            const wingGeo = new THREE.PlaneGeometry(0.35, 0.2); wingGeo.translate(0.15, 0, 0);
            const wingMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee, side: THREE.DoubleSide });
            const rightWing = new THREE.Mesh(wingGeo, wingMat);
            const leftWing = new THREE.Mesh(wingGeo, wingMat); leftWing.scale.x = -1;
            birdGroup.add(rightWing, leftWing);

            birdGroup.userData = { rightWing, leftWing, flapSpeed: Math.random()*0.08+0.05, flySpeed: Math.random()*0.02+0.02, offset: Math.random()*Math.PI*2, baseY: Math.random()*4+4 };
            return birdGroup;
        }
        for(let i = 0; i < 12; i++) {
            let b = createDetailedBird(); b.position.set((Math.random() - 0.5) * 25, b.userData.baseY, (Math.random() - 0.5) * 10 - 2);
            b.rotation.y = -Math.PI / 6; birds.push(b); phase1Group.add(b);
        }

        // --- গ্রুপ ২: রেইনি ভিলেজ (স্টেপ ২) ---
        const phase2Group = new THREE.Group();
        phase2Group.visible = false;
        scene.add(phase2Group);

        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x182d18, roughness: 0.7, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeo, groundMat); ground.rotation.x = -Math.PI / 2;
        phase2Group.add(ground);

        function createAdvancedHouse() {
            const houseGroup = new THREE.Group();
            const walls = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 3), new THREE.MeshStandardMaterial({ color: 0x9c6656, roughness: 0.5 }));
            walls.position.y = 1.25; houseGroup.add(walls);
            const roof = new THREE.Mesh(new THREE.ConeGeometry(2.6, 1.8, 4), new THREE.MeshStandardMaterial({ color: 0x7a2f2f, roughness: 0.5 }));
            roof.position.y = 3.4; roof.rotation.y = Math.PI / 4; houseGroup.add(roof);
            const windowMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xffbb33, emissive: 0xffbb33, emissiveIntensity: 2.0 }));
            windowMesh.position.set(0, 1.5, 1.51); houseGroup.add(windowMesh);
            return houseGroup;
        }
        function createAdvancedTree() {
            const treeGroup = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 2, 8), new THREE.MeshStandardMaterial({ color: 0x5c3a21, roughness: 0.6 })); trunk.position.y = 1; treeGroup.add(trunk);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x1e5225, roughness: 0.5 });
            const leaves1 = new THREE.Mesh(new THREE.ConeGeometry(1.2, 2, 8), leavesMat); leaves1.position.y = 2.5; treeGroup.add(leaves1);
            const leaves2 = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.5, 8), leavesMat); leaves2.position.y = 3.5; treeGroup.add(leaves2);
            return treeGroup;
        }

        for(let i = 0; i < 15; i++) {
            const house = createAdvancedHouse();
            let x = (Math.random() - 0.5) * 40; let z = (Math.random() - 0.5) * 40;
            if(Math.abs(x) < 5 && Math.abs(z) < 5) { x += 10; z += 10; }
            house.position.set(x, 0, z); phase2Group.add(house);
            for(let j = 0; j < 3; j++) {
                const tree = createAdvancedTree(); tree.position.set(house.position.x + (Math.random() - 0.5) * 7, 0, house.position.z + (Math.random() - 0.5) * 7);
                const scale = 0.8 + Math.random() * 0.4; tree.scale.set(scale, scale, scale); phase2Group.add(tree);
            }
        }

        const rainCount = 8000;
        const rainGeo = new THREE.BufferGeometry();
        const rainPositions = new Float32Array(rainCount * 3);
        const rainVelocity = [];
        for (let i = 0; i < rainCount * 3; i += 3) {
            rainPositions[i] = (Math.random() - 0.5) * 60; rainPositions[i+1] = Math.random() * 40; rainPositions[i+2] = (Math.random() - 0.5) * 60;
            rainVelocity.push({ y: 0.25 + Math.random() * 0.2, x: -0.04 });
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
        const rainParticles = new THREE.Points(rainGeo, new THREE.PointsMaterial({ color: 0xcccccc, size: 0.05, transparent: true, opacity: 0.5 }));
        phase2Group.add(rainParticles);

        const fireflyCount = 50;
        const fireflyGeo = new THREE.BufferGeometry();
        const fireflyPositions = new Float32Array(fireflyCount * 3);
        for(let i = 0; i < fireflyCount * 3; i += 3) {
            fireflyPositions[i] = (Math.random() - 0.5) * 40; fireflyPositions[i+1] = 0.5 + Math.random() * 2.5; fireflyPositions[i+2] = (Math.random() - 0.5) * 40;
        }
        fireflyGeo.setAttribute('position', new THREE.BufferAttribute(fireflyPositions, 3));
        const fireflies = new THREE.Points(fireflyGeo, new THREE.PointsMaterial({ color: 0x7fff00, size: 0.15, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending }));
        phase2Group.add(fireflies);

        // --- গ্রুপ ৩: ঢেউখেলানো নীল সমুদ্র (স্টেপ ৩) ---
        const phase3Group = new THREE.Group();
        phase3Group.visible = false;
        scene.add(phase3Group);

        const planeGeo = new THREE.PlaneGeometry(20, 20, 40, 40);
        const seaPlane = new THREE.Mesh(planeGeo, new THREE.MeshLambertMaterial({ color: 0x0055ff, side: THREE.DoubleSide, roughness: 0.3 }));
        seaPlane.rotation.x = -Math.PI / 2; seaPlane.position.y = -2;
        phase3Group.add(seaPlane);

        // --- টাইমিং এবং অ্যানিমেশন সেটআপ ---
        const clock = new THREE.Clock(false); 
        let journeyStarted = false;
        const step1Duration = 8.0;   
        const step2Duration = 10.0;  
        const totalIntroTime = step1Duration + step2Duration; 

        function animate() {
            requestAnimationFrame(animate);
            
            if (!journeyStarted) {
                renderer.render(scene, camera);
                return;
            }

            const elapsedTime = clock.getElapsedTime();

            if (elapsedTime < step1Duration) {
                phase1Group.visible = true;
                phase2Group.visible = false;
                phase3Group.visible = false;

                camera.position.set(Math.sin(elapsedTime * 0.1) * 2, 3, 12);
                camera.lookAt(0, 3, 0);

                const starPos = stars.geometry.attributes.position.array;
                for(let i=1; i<starPos.length; i+=3) { starPos[i] += Math.sin(elapsedTime + i) * 0.005; }
                stars.geometry.attributes.position.needsUpdate = true;

                const rLines = rainLines.geometry.attributes.position.array;
                for(let i=1; i<rLines.length; i+=6) {
                    rLines[i] -= 0.25; rLines[i+3] -= 0.25;
                    if(rLines[i] < -2) { const newY = 25 + Math.random()*5; rLines[i] = newY; rLines[i+3] = newY - 0.8; }
                }
                rainLines.geometry.attributes.position.needsUpdate = true;

                birds.forEach(b => {
                    b.children[1].rotation.z = Math.sin(elapsedTime * 12 * b.userData.flapSpeed + b.userData.offset) * 0.5;
                    b.children[2].rotation.z = -Math.sin(elapsedTime * 12 * b.userData.flapSpeed + b.userData.offset) * 0.5;
                    b.position.x += b.userData.flySpeed;
                    b.position.y = b.userData.baseY + Math.sin(elapsedTime + b.userData.offset) * 0.3;
                    if(b.position.x > 15) b.position.x = -15;
                });

            } else if (elapsedTime < totalIntroTime) {
                if(!phase2Group.visible) {
                    phase1Group.visible = false;
                    phase2Group.visible = true;
                    scene.background.setHex(0x0b0f19);
                    scene.fog.color.setHex(0x0b0f19);
                }

                const vTime = elapsedTime - step1Duration;
                camera.position.x = Math.sin(vTime * 0.08) * 35;
                camera.position.z = Math.cos(vTime * 0.08) * 35;
                camera.position.y = 12 + Math.sin(vTime * 0.1) * 3;
                camera.lookAt(0, 2, 0);

                const positions = rainGeo.attributes.position.array;
                let velIndex = 0;
                for (let i = 0; i < rainCount * 3; i += 3) {
                    positions[i+1] -= rainVelocity[velIndex].y;
                    positions[i] += rainVelocity[velIndex].x;
                    if (positions[i+1] < 0) { positions[i+1] = 40; positions[i] = (Math.random() - 0.5) * 60; }
                    velIndex++;
                }
                rainGeo.attributes.position.needsUpdate = true;

                const fPositions = fireflyGeo.attributes.position.array;
                for(let i = 0; i < fireflyCount * 3; i += 3) {
                    fPositions[i] += Math.sin(elapsedTime + i) * 0.01;
                    fPositions[i+1] += Math.cos(elapsedTime + i) * 0.005;
                    fPositions[i+2] += Math.sin(elapsedTime * 0.5 + i) * 0.01;
                }
                fireflyGeo.attributes.position.needsUpdate = true;

            } else {
                if(!phase3Group.visible) {
                    phase2Group.visible = false;
                    phase3Group.visible = true;
                    scene.background.setHex(0x000a1a);
                    scene.fog.color.setHex(0x000a1a);
                    scene.fog.density = 0.04;
                    document.body.style.backgroundColor = "#000a1a";
                    camera.position.set(0, 2, 10);
                    camera.lookAt(0, 0, 0);
                }

                const positions = seaPlane.geometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    positions[i + 2] = Math.sin(positions[i] * 0.5 + elapsedTime) * Math.cos(positions[i+1] * 0.5 + elapsedTime);
                }
                seaPlane.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        // --- স্টার্ট বাটন ক্লিক লজিক (মিউজিক ও টেক্সট ট্রিগার) ---
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const textItems = document.querySelectorAll('.text-item');

        startBtn.addEventListener('click', () => {
            journeyStarted = true;
            clock.start(); 

            // ব্রাউজারকে প্রথমে গানটি প্লে করতে দেওয়া হলো, প্লে সফল হলেই সেটি ২ মিনিট ৩ সেকেন্ডে (১২৩ সেকেন্ড) জাম্প করবে
            bgMusic.play().then(() => {
                bgMusic.currentTime = 123; 
            }).catch(error => console.log("Audio play failed:", error));

            // ওভারলে স্ক্রিন সরিয়ে ফেলা হলো
            startOverlay.style.opacity = '0';
            setTimeout(() => startOverlay.style.display = 'none', 1000);

            // টেক্সটগুলো একের পর এক আসার লজিক
            textItems.forEach((item, index) => {
                setTimeout(() => {
                    item.classList.add('show');
                }, (totalIntroTime * 1000) + (index * 2500)); 
            });
        });
    </script>
</body>
                                                              </html>
